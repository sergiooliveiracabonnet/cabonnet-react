services:
  cabonnet:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      # Persist Grafana snapshots across container restarts
      - backup_data:/app/Backup
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  backup_data:
