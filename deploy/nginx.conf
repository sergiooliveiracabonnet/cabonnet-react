# Reverse proxy Nginx para o Cabonnet (servidor.js escuta em 127.0.0.1:3000).
#
# Instalação:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/cabonnet
#   sudo ln -s /etc/nginx/sites-available/cabonnet /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d seu-dominio.com.br   # gera o bloco HTTPS automaticamente
#
# Troque "seu-dominio.com.br" pelo domínio real antes de aplicar.

server {
    listen 80;
    listen [::]:80;
    server_name seu-dominio.com.br;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Necessário para WebSocket (Vite HMR em dev / futuras features realtime)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 300s;
    }

    location /health {
        proxy_pass http://127.0.0.1:3000/health;
        access_log off;
    }
}
